spring:
  application:
    name: ari-blockchain-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ari}
    username: ${DB_USER:ari}
    password: ${DB_PASSWORD:ari_dev_password}

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8081}

ari:
  region: ${ARI_REGION:TR}
  core-banking:
    url: ${CORE_BANKING_URL:${ARI_CORE_BANKING_URL:${ARI_BLOCKCHAIN_CORE_BANKING_URL:http://localhost:8080}}}
    # SECURITY: API key for calling core-banking internal endpoints
    internal-api-key: ${INTERNAL_API_KEY:${ARI_INTERNAL_API_KEY:}}  # No default - must be configured
  blockchain:
    tr-l1:
      rpc-url: ${TR_L1_RPC_URL:${ARI_BLOCKCHAIN_TR_L1_RPC_URL:https://nodes-prod.18.182.4.86.sslip.io/ext/bc/2P1BXtVXL2xnUjDzLYnDu114Z8dhqV8iLrcKbMdmmWaTkmtKfM/rpc}}
      chain-id: ${TR_L1_CHAIN_ID:1279}
      stablecoin-address: ${TR_STABLECOIN_ADDRESS:}
      # Cross-currency: ariEUR deployed natively on TR L1
      eur-stablecoin-address: ${TR_EUR_STABLECOIN_ADDRESS:}
      # Multisig governance addresses
      multisig-address: ${TR_MULTISIG_ADDRESS:}
      timelock-address: ${TR_TIMELOCK_ADDRESS:}
    eu-l1:
      rpc-url: ${EU_L1_RPC_URL:${ARI_BLOCKCHAIN_EU_L1_RPC_URL:https://nodes-prod.18.182.4.86.sslip.io/ext/bc/7ScHYNLYUpWHr5wN5xtBjPN9UV9dTCAYSqYgeMUc6x5ssaXLt/rpc}}
      chain-id: ${EU_L1_CHAIN_ID:1832}
      stablecoin-address: ${EU_STABLECOIN_ADDRESS:}
      # Cross-currency: ariTRY deployed natively on EU L1
      try-stablecoin-address: ${EU_TRY_STABLECOIN_ADDRESS:}
      multisig-address: ${EU_MULTISIG_ADDRESS:}
      timelock-address: ${EU_TIMELOCK_ADDRESS:}
    bridge:
      # Burn-mint bridge contracts (same-currency cross-border)
      tr-burn-mint-bridge-address: ${TR_BURN_MINT_BRIDGE_ADDRESS:}
      eu-burn-mint-bridge-address: ${EU_BURN_MINT_BRIDGE_ADDRESS:}
      # ICTT bridge contracts - BridgeAdapter (high-level bridge orchestration)
      tr-bridge-adapter-address: ${TR_BRIDGE_ADAPTER_ADDRESS:}
      eu-bridge-adapter-address: ${EU_BRIDGE_ADAPTER_ADDRESS:}
      # ICTT bridge contracts - TokenHome (locks native tokens when bridging out)
      tr-token-home-address: ${TR_TOKEN_HOME_ADDRESS:}
      eu-token-home-address: ${EU_TOKEN_HOME_ADDRESS:}
      # ICTT bridge contracts - TokenRemote (mints/burns wrapped tokens from partner chain)
      # TR L1 has wEUR (wrapped EUR from EU), EU L1 has wTRY (wrapped TRY from TR)
      tr-token-remote-address: ${TR_TOKEN_REMOTE_ADDRESS:}
      eu-token-remote-address: ${EU_TOKEN_REMOTE_ADDRESS:}
      # Avalanche blockchain IDs (bytes32 hex) for Teleporter cross-chain messaging
      tr-blockchain-id: ${TR_BLOCKCHAIN_ID:}
      eu-blockchain-id: ${EU_BLOCKCHAIN_ID:}
    vehicle:
      nft-address: ${VEHICLE_NFT_ADDRESS:}
      escrow-address: ${VEHICLE_ESCROW_ADDRESS:}
      treasury-address: ${TREASURY_ADDRESS:}
    wallet:
      # SECURITY: NO DEFAULT - Master key must be provided via secure secret management
      # In production, use AWS KMS or HashiCorp Vault for key management
      # This should be a reference to a secret, not the actual key
      master-key: ${WALLET_MASTER_KEY:}  # No default - must be configured
      # Use AWS KMS key ID for production signing
      kms-key-id: ${WALLET_KMS_KEY_ID:}
    relayer:
      # SECURITY: NO DEFAULT - Relayer key must be provided via secure secret management
      private-key: ${RELAYER_PRIVATE_KEY:}  # No default - must be configured
    # Role-specific keys (to replace single master key)
    keys:
      minter: ${MINTER_PRIVATE_KEY:}
      admin: ${ADMIN_PRIVATE_KEY:}
      bridge-operator: ${BRIDGE_OPERATOR_PRIVATE_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
