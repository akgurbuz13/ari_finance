name: ova_mobile
description: Ova Fintech Platform - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Biometric authentication
  local_auth: ^2.1.8

  # Formatting / Internationalization
  intl: ^0.19.0

  # Typography
  google_fonts: ^6.1.0

  # Cupertino icons (iOS style)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets: []
