spring:
  application:
    name: ova-core-banking

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ova}
    username: ${DB_USER:ova}
    password: ${DB_PASSWORD:ova_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity,ledger,payments,shared

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

ova:
  region: ${OVA_REGION:TR}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
    access-token-expiry: 900 # 15 minutes in seconds
    refresh-token-expiry: 604800 # 7 days in seconds
  blockchain-service:
    url: ${BLOCKCHAIN_SERVICE_URL:http://localhost:8081}
