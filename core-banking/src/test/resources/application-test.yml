spring:
  application:
    name: ova-core-banking-test

  main:
    allow-bean-definition-overriding: true

  task:
    scheduling:
      pool:
        size: 1

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity,ledger,payments,shared

  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 0

ova:
  region: TR
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-algorithm
    access-token-expiry: 900
    refresh-token-expiry: 604800
  blockchain-service:
    url: http://localhost:8081
  outbox:
    poller:
      enabled: false
