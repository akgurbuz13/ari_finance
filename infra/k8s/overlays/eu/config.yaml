apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-banking
  namespace: ari
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: core-banking
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 2Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ari-ingress
  namespace: ari
spec:
  # TODO: needs DNS update (renamed from ova.app)
  tls:
    - hosts:
        - api.ari.app
        - app.ari.app
        - admin.ari.app
      secretName: ari-eu-tls
  rules:
    - host: api.ari.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-banking
                port:
                  number: 8080
    - host: app.ari.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: admin.ari.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-console
                port:
                  number: 3001
