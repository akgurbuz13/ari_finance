apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ari

resources:
  - ../../base

patchesStrategicMerge:
  - config.yaml

commonLabels:
  ari.region: eu

configMapGenerator:
  - name: ari-config
    literals:
      - spring.profiles.active=eu
      - ari.region=EU
      # TODO: needs DNS update (renamed from ova-redis.abcdef.euc1.cache.amazonaws.com)
      - redis.host=ari-redis.abcdef.euc1.cache.amazonaws.com
      # TODO: needs DNS update (renamed from ova.app)
      - cors.allowed-origins=https://app.ari.app,https://admin.ari.app
      - api.url=https://api.ari.app

images:
  - name: core-banking
    newName: 123456789.dkr.ecr.eu-central-1.amazonaws.com/ari/core-banking
    newTag: latest
  - name: blockchain-service
    newName: 123456789.dkr.ecr.eu-central-1.amazonaws.com/ari/blockchain-service
    newTag: latest
  - name: ari-web
    newName: 123456789.dkr.ecr.eu-central-1.amazonaws.com/ari/web
    newTag: latest
  - name: ari-admin-console
    newName: 123456789.dkr.ecr.eu-central-1.amazonaws.com/ari/admin-console
    newTag: latest
