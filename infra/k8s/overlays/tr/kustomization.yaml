apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ari

resources:
  - ../../base

patchesStrategicMerge:
  - config.yaml

commonLabels:
  ari.region: tr

configMapGenerator:
  - name: ari-config
    literals:
      - spring.profiles.active=tr
      - ari.region=TR
      # TODO: needs DNS update (renamed from ova-redis.redis.cache.windows.net)
      - redis.host=ari-redis.redis.cache.windows.net
      # TODO: needs DNS update (renamed from ova.com.tr)
      - cors.allowed-origins=https://app.ari.com.tr,https://admin.ari.com.tr
      - api.url=https://api.ari.com.tr

images:
  - name: core-banking
    # TODO: needs Azure resource rename (renamed from ovaacr.azurecr.io)
    newName: ariacr.azurecr.io/ari/core-banking
    newTag: latest
  - name: blockchain-service
    # TODO: needs Azure resource rename (renamed from ovaacr.azurecr.io)
    newName: ariacr.azurecr.io/ari/blockchain-service
    newTag: latest
  - name: ari-web
    newName: ariacr.azurecr.io/ari/web
    newTag: latest
  - name: ari-admin-console
    newName: ariacr.azurecr.io/ari/admin-console
    newTag: latest
