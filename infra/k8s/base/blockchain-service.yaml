apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-service
  namespace: ova
  labels:
    app: blockchain-service
spec:
  # Single replica required: outbox poller uses SELECT FOR UPDATE with
  # single-consumer semantics. Multiple replicas would cause duplicate
  # processing. Implement leader election before scaling beyond 1.
  replicas: 1
  selector:
    matchLabels:
      app: blockchain-service
  template:
    metadata:
      labels:
        app: blockchain-service
    spec:
      serviceAccountName: blockchain-service
      containers:
        - name: blockchain-service
          image: blockchain-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ova-config
                  key: spring.profiles.active
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ova-db-credentials
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ova-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ova-db-credentials
                  key: password
            - name: CORE_BANKING_URL
              value: http://core-banking:8080
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ova-internal-api-key
                  key: api-key
            - name: ARI_BLOCKCHAIN_TR_L1_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: ova-blockchain-config
                  key: tr-l1-rpc-url
            - name: ARI_BLOCKCHAIN_EU_L1_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: ova-blockchain-config
                  key: eu-l1-rpc-url
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-service
  namespace: ova
spec:
  selector:
    app: blockchain-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockchain-service
  namespace: ova
