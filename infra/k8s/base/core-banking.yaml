apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-banking
  namespace: ari
  labels:
    app: core-banking
    app.kubernetes.io/name: core-banking
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ari-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: core-banking
  template:
    metadata:
      labels:
        app: core-banking
        app.kubernetes.io/name: core-banking
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: core-banking
      automountServiceAccountToken: false
      # Pod Security Context - run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Prevent scheduling on same node for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - core-banking
                topologyKey: kubernetes.io/hostname
      containers:
        - name: core-banking
          image: core-banking:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          # Container Security Context - strict security
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ari-config
                  key: spring.profiles.active
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ari-db-credentials
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ari-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ari-db-credentials
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: ari-config
                  key: redis.host
            - name: ARI_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ari-jwt-secret
                  key: secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ari-jwt-secret
                  key: secret
            - name: ARI_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ari-internal-api-key
                  key: api-key
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ari-internal-api-key
                  key: api-key
            - name: BLOCKCHAIN_SERVICE_URL
              value: http://blockchain-service:8081
            - name: ARI_REGION
              valueFrom:
                configMapKeyRef:
                  name: ari-config
                  key: ari.region
            - name: ARI_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: ari-config
                  key: cors.allowed-origins
            - name: RAILS_WEBHOOK_FAST_SECRET
              valueFrom:
                secretKeyRef:
                  name: ari-rails-webhook-secrets
                  key: fast-secret
                  optional: true
            - name: RAILS_WEBHOOK_EFT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ari-rails-webhook-secrets
                  key: eft-secret
                  optional: true
            - name: RAILS_WEBHOOK_SEPA_SECRET
              valueFrom:
                secretKeyRef:
                  name: ari-rails-webhook-secrets
                  key: sepa-secret
                  optional: true
            - name: KYC_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: ari-kyc-webhook-secret
                  key: secret
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          # Writable directories for Spring Boot temp files
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: spring-tmp
              mountPath: /app/tmp
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Startup probe for slow-starting containers
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      # Ephemeral volumes for temp files (read-only root filesystem)
      volumes:
        - name: tmp
          emptyDir: {}
        - name: spring-tmp
          emptyDir: {}
      # Graceful shutdown
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: core-banking
  namespace: ari
spec:
  selector:
    app: core-banking
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-banking
  namespace: ari
