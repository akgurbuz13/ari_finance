apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-banking
  namespace: ova
  labels:
    app: core-banking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-banking
  template:
    metadata:
      labels:
        app: core-banking
    spec:
      serviceAccountName: core-banking
      containers:
        - name: core-banking
          image: core-banking:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: ova-config
                  key: spring.profiles.active
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ova-db-credentials
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ova-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ova-db-credentials
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: ova-config
                  key: redis.host
            - name: OVA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ova-jwt-secret
                  key: secret
            - name: OVA_REGION
              valueFrom:
                configMapKeyRef:
                  name: ova-config
                  key: ova.region
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: core-banking
  namespace: ova
spec:
  selector:
    app: core-banking
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-banking
  namespace: ova
