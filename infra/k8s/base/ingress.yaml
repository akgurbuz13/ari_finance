apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ari-ingress
  namespace: ari
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  # TODO: ari.app domains need DNS registration and certificate provisioning (renamed from ova.app)
  tls:
    - hosts:
        - api.ari.app
        - app.ari.app
        - admin.ari.app
      secretName: ari-tls
  rules:
    - host: api.ari.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-banking
                port:
                  number: 8080
    - host: app.ari.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: admin.ari.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-console
                port:
                  number: 3001
