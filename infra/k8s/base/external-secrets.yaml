---
# External Secrets Configuration
# Uses external-secrets-operator to sync secrets from AWS Secrets Manager / Azure Key Vault
# Prerequisites: Install external-secrets-operator in cluster

# ClusterSecretStore for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1  # Override in overlays for TR region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# Database credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ova-db-credentials
  namespace: ova
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ova-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: ova/database
        property: host
    - secretKey: port
      remoteRef:
        key: ova/database
        property: port
    - secretKey: database
      remoteRef:
        key: ova/database
        property: database
    - secretKey: username
      remoteRef:
        key: ova/database
        property: username
    - secretKey: password
      remoteRef:
        key: ova/database
        property: password
---
# JWT secret from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ova-jwt-secret
  namespace: ova
spec:
  refreshInterval: 24h  # JWT secret changes less frequently
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ova-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: ova/jwt
        property: secret
---
# Internal API key for service-to-service communication
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ova-internal-api-key
  namespace: ova
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ova-internal-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: ova/internal-api
        property: api-key
---
# Blockchain wallet keys (highly sensitive - consider HSM/KMS)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ova-blockchain-keys
  namespace: ova
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ova-blockchain-keys
    creationPolicy: Owner
  data:
    - secretKey: minter-key
      remoteRef:
        key: ova/blockchain/minter
        property: private-key
    - secretKey: relayer-key
      remoteRef:
        key: ova/blockchain/relayer
        property: private-key
    - secretKey: bridge-operator-key
      remoteRef:
        key: ova/blockchain/bridge-operator
        property: private-key
---
# Compliance API keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ova-compliance-secrets
  namespace: ova
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ova-compliance-secrets
    creationPolicy: Owner
  data:
    - secretKey: masak-api-key
      remoteRef:
        key: ova/compliance/masak
        property: api-key
        # Optional - if not set, will use empty string
    - secretKey: sanctions-provider-key
      remoteRef:
        key: ova/compliance/sanctions
        property: api-key
