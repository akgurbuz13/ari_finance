---
# External Secrets Configuration
# Uses external-secrets-operator to sync secrets from AWS Secrets Manager / Azure Key Vault
# Prerequisites: Install external-secrets-operator in cluster

# ClusterSecretStore for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1  # Override in overlays for TR region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# Database credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-db-credentials
  namespace: ari
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        # TODO: rename AWS Secrets Manager key from ova/database to ari/database
        key: ari/database
        property: host
    - secretKey: port
      remoteRef:
        key: ari/database
        property: port
    - secretKey: database
      remoteRef:
        key: ari/database
        property: database
    - secretKey: username
      remoteRef:
        key: ari/database
        property: username
    - secretKey: password
      remoteRef:
        key: ari/database
        property: password
---
# JWT secret from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-jwt-secret
  namespace: ari
spec:
  refreshInterval: 24h  # JWT secret changes less frequently
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        # TODO: rename AWS Secrets Manager key from ova/jwt to ari/jwt
        key: ari/jwt
        property: secret
---
# Internal API key for service-to-service communication
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-internal-api-key
  namespace: ari
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-internal-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        # TODO: rename AWS Secrets Manager key from ova/internal-api to ari/internal-api
        key: ari/internal-api
        property: api-key
---
# Blockchain wallet keys (highly sensitive - consider HSM/KMS)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-blockchain-keys
  namespace: ari
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-blockchain-keys
    creationPolicy: Owner
  data:
    - secretKey: minter-key
      remoteRef:
        # TODO: rename AWS Secrets Manager keys from ova/blockchain/* to ari/blockchain/*
        key: ari/blockchain/minter
        property: private-key
    - secretKey: relayer-key
      remoteRef:
        key: ari/blockchain/relayer
        property: private-key
    - secretKey: bridge-operator-key
      remoteRef:
        key: ari/blockchain/bridge-operator
        property: private-key
---
# Compliance API keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-compliance-secrets
  namespace: ari
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-compliance-secrets
    creationPolicy: Owner
  data:
    - secretKey: masak-api-key
      remoteRef:
        # TODO: rename AWS Secrets Manager keys from ova/compliance/* to ari/compliance/*
        key: ari/compliance/masak
        property: api-key
        # Optional - if not set, will use empty string
    - secretKey: sanctions-provider-key
      remoteRef:
        key: ari/compliance/sanctions
        property: api-key
---
# Rail webhook signing secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-rails-webhook-secrets
  namespace: ari
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-rails-webhook-secrets
    creationPolicy: Owner
  data:
    - secretKey: fast-secret
      remoteRef:
        # TODO: rename AWS Secrets Manager keys from ova/rails/* to ari/rails/*
        key: ari/rails/fast
        property: webhook-secret
    - secretKey: eft-secret
      remoteRef:
        key: ari/rails/eft
        property: webhook-secret
    - secretKey: sepa-secret
      remoteRef:
        key: ari/rails/sepa
        property: webhook-secret
---
# KYC webhook signature secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ari-kyc-webhook-secret
  namespace: ari
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: ari-kyc-webhook-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        # TODO: rename AWS Secrets Manager key from ova/kyc to ari/kyc
        key: ari/kyc
        property: webhook-secret
