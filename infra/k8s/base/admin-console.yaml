apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-console
  namespace: ova
  labels:
    app: admin-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-console
  template:
    metadata:
      labels:
        app: admin-console
    spec:
      containers:
        - name: admin-console
          image: ova-admin-console:latest
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: ova-config
                  key: api.url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-console
  namespace: ova
spec:
  selector:
    app: admin-console
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
