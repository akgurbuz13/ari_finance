name: Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false'

jobs:
  # Kotlin backend - lint, test, build
  backend:
    name: Backend (Kotlin/Spring Boot)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ova_test
          POSTGRES_USER: ova
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew ktlintCheck

      - name: Test core-banking
        run: ./gradlew :core-banking:test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ova_test
          SPRING_DATASOURCE_USERNAME: ova
          SPRING_DATASOURCE_PASSWORD: test_password
          SPRING_DATA_REDIS_HOST: localhost

      - name: Test blockchain-service
        run: ./gradlew :blockchain-service:test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ova_test
          SPRING_DATASOURCE_USERNAME: ova
          SPRING_DATASOURCE_PASSWORD: test_password

      - name: Build JARs
        run: ./gradlew bootJar

      - name: Upload core-banking artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-banking-jar
          path: core-banking/build/libs/*.jar

      - name: Upload blockchain-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockchain-service-jar
          path: blockchain-service/build/libs/*.jar

  # Smart contracts
  contracts:
    name: Smart Contracts (Solidity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: contracts

      - name: Compile contracts
        run: npx hardhat compile
        working-directory: contracts

      - name: Run tests
        run: npx hardhat test
        working-directory: contracts

  # Web app
  web:
    name: Web App (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  # Admin console
  admin:
    name: Admin Console (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: admin-console

      - name: Lint
        run: npm run lint
        working-directory: admin-console

      - name: Build
        run: npm run build
        working-directory: admin-console

  # Docker images
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, web, admin]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: core-banking
            context: .
            dockerfile: core-banking/Dockerfile
          - name: blockchain-service
            context: .
            dockerfile: blockchain-service/Dockerfile
          - name: web
            context: web
            dockerfile: web/Dockerfile
          - name: admin-console
            context: admin-console
            dockerfile: admin-console/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: ova/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
