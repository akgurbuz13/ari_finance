name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - service: core-banking
            context: .
            dockerfile: core-banking/Dockerfile
          - service: blockchain-service
            context: .
            dockerfile: blockchain-service/Dockerfile
          - service: web
            context: web
            dockerfile: web/Dockerfile
          - service: admin-console
            context: admin-console
            dockerfile: admin-console/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # EU - AWS ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ github.ref_name }}
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ari/${{ matrix.service }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-eu:
    name: Deploy to EU (AWS EKS)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production-eu
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ari-eu --region eu-central-1

      - name: Deploy with Kustomize
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          cd infra/k8s/overlays/eu
          kustomize edit set image "core-banking=*:${IMAGE_TAG}"
          kustomize edit set image "blockchain-service=*:${IMAGE_TAG}"
          kustomize edit set image "ari-web=*:${IMAGE_TAG}"
          kustomize edit set image "ari-admin-console=*:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/core-banking -n ari --timeout=300s
          kubectl rollout status deployment/blockchain-service -n ari --timeout=300s
          kubectl rollout status deployment/web -n ari --timeout=120s

      - name: Health check
        run: |
          sleep 10
          kubectl exec -n ari deploy/core-banking -- wget -q --spider http://localhost:8080/actuator/health || echo "Health check warning"

  deploy-tr:
    name: Deploy to TR (Azure AKS)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production-tr
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          # TODO: needs Azure resource rename from ova-tr-rg to ari-tr-rg
          resource-group: ari-tr-rg
          # TODO: needs Azure resource rename from ova-tr-aks to ari-tr-aks
          cluster-name: ari-tr-aks

      - name: Deploy with Kustomize
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          cd infra/k8s/overlays/tr
          kustomize edit set image "core-banking=*:${IMAGE_TAG}"
          kustomize edit set image "blockchain-service=*:${IMAGE_TAG}"
          kustomize edit set image "ari-web=*:${IMAGE_TAG}"
          kustomize edit set image "ari-admin-console=*:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/core-banking -n ari --timeout=300s
          kubectl rollout status deployment/blockchain-service -n ari --timeout=300s
          kubectl rollout status deployment/web -n ari --timeout=120s

      - name: Health check
        run: |
          sleep 10
          kubectl exec -n ari deploy/core-banking -- wget -q --spider http://localhost:8080/actuator/health || echo "Health check warning"
